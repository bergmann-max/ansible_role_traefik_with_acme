---
# roles/ansible_role_traefik_with_acme/tasks/main.yml

- name: Prepare directories and credential files
  tags: traefik_prepare
  block:
    - name: Ensure Traefik project directory exists
      ansible.builtin.file:
        path: "{{ traefik_with_acme_docker_compose_dir }}"
        state: directory
        owner: "{{ traefik_with_acme_traefik_user }}"
        group: "{{ traefik_with_acme_docker_group }}"
        mode: 'u=rwx,g=rx,o=rx'

    - name: Create config subdirectory
      ansible.builtin.file:
        path: "{{ traefik_with_acme_docker_compose_dir }}/config"
        owner: "{{ traefik_with_acme_traefik_user }}"
        group: "{{ traefik_with_acme_docker_group }}"
        state: directory
        mode: 'u=rwx,g=rx,o=rx'

    - name: Ensure letsencrypt directory exists
      ansible.builtin.file:
        path: "{{ traefik_with_acme_docker_compose_dir }}/letsencrypt"
        owner: "{{ traefik_with_acme_traefik_user }}"
        group: "{{ traefik_with_acme_docker_group }}"
        state: directory
        mode: 'u=rwx,g=rx,o=rx'

    - name: Ensure ACME storage file exists
      ansible.builtin.file:
        path: "{{ traefik_with_acme_docker_compose_dir }}/letsencrypt/acme.json"
        owner: "{{ traefik_with_acme_traefik_user }}"
        group: "{{ traefik_with_acme_docker_group }}"
        state: touch
        mode: 'u=rw,g=,o=-'
        modification_time: preserve
        access_time: preserve

- name: Template Traefik configuration files
  tags: traefik_config
  block:
    - name: Template traefik.yml config
      ansible.builtin.template:
        src: traefik.yml.j2
        dest: "{{ traefik_with_acme_docker_compose_dir }}/traefik.yml"
        owner: "{{ traefik_with_acme_traefik_user }}"
        group: "{{ traefik_with_acme_docker_group }}"
        mode: 'u=rw,g=r,o=r'

    - name: Template dashboard.yml config
      ansible.builtin.template:
        src: dashboard.yml.j2
        dest: "{{ traefik_with_acme_docker_compose_dir }}/config/dashboard.yml"
        owner: "{{ traefik_with_acme_traefik_user }}"
        group: "{{ traefik_with_acme_docker_group }}"
        mode: 'u=rw,g=r,o=r'

- name: Deploy Traefik stack via Docker Compose
  tags: traefik_deploy
  block:
    - name: Ensure Docker Compose project directory exists
      ansible.builtin.file:
        path: "{{ traefik_with_acme_docker_compose_dir }}"
        owner: "{{ traefik_with_acme_traefik_user }}"
        group: "{{ traefik_with_acme_docker_group }}"
        state: directory
        mode: 'u=rwx,g=rx,o=rx'

    - name: Deploy Docker Compose file
      ansible.builtin.template:
        src: "docker-compose.yml.j2"
        dest: "{{ traefik_with_acme_docker_compose_dir }}/docker-compose.yml"
        owner: "{{ traefik_with_acme_traefik_user }}"
        group: "{{ traefik_with_acme_docker_group }}"
        mode: 'u=rw,g=r,o=r'

    - name: Deploy Cloudflare API token as Docker secret file
      ansible.builtin.copy:
        content: "{{ traefik_with_acme_cf_token }}"
        dest: "{{ traefik_with_acme_docker_compose_dir }}/cf_dns_api_token.secret"
        owner: "{{ traefik_with_acme_traefik_user }}"
        group: "{{ traefik_with_acme_docker_group }}"
        mode: 'u=r,g=,o=-'
      no_log: true

- name: Start Traefik via Docker Compose
  tags: traefik_start
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ traefik_with_acme_docker_compose_dir }}"
  changed_when: false
