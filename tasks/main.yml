---
# roles/ansible_role_traefik_with_acme/tasks/main.yml

- name: Traefik System User Setup
  tags: traefik_user_setup
  block:
    - name: Ensure docker group exists
      ansible.builtin.group:
        name: "{{ ansible_role_traefik_with_acme_docker_group }}"

    - name: Ensure traefik system user exists
      ansible.builtin.user:
        name: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        create_home: false
        shell: /sbin/nologin
        system: true

- name: Prepare directories and credential files
  tags: traefik_prepare
  block:
    - name: Ensure Traefik project directory exists
      ansible.builtin.file:
        path: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}"
        state: directory
        owner: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        mode: 'u=rwx,g=rx,o=rx'

    - name: Create config subdirectory
      ansible.builtin.file:
        path: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}/config"
        owner: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        state: directory
        mode: 'u=rwx,g=rx,o=rx'

    - name: Ensure letsencrypt directory exists
      ansible.builtin.file:
        path: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}/letsencrypt"
        owner: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        state: directory
        mode: 'u=rwx,g=rx,o=rx'

    - name: Ensure ACME storage file exists
      ansible.builtin.file:
        path: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}/letsencrypt/acme.json"
        owner: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        state: touch
        mode: 'u=rw,g=,o='

- name: Template Traefik configuration files
  tags: traefik_config
  block:
    - name: Template docker-compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}/docker-compose.yml"
        mode: 'u=rw,g=r,o=r'

    - name: Template traefik.yml config
      ansible.builtin.template:
        src: traefik.yml.j2
        dest: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}/traefik.yml"
        owner: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        mode: 'u=rw,g=r,o=r'

    - name: Template dashboard.yml config
      ansible.builtin.template:
        src: dashboard.yml.j2
        dest: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}/config/dashboard.yml"
        owner: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        mode: 'u=rw,g=r,o=r'

- name: Deploy Traefik stack via Docker Compose
  tags: traefik_deploy
  block:
    - name: Ensure Docker Compose project directory exists
      ansible.builtin.file:
        path: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}"
        owner: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        state: directory
        mode: 'u=rwx,g=rx,o=rx'

    - name: Deploy Docker Compose file
      ansible.builtin.template:
        src: "docker-compose.yml.j2"
        dest: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}/docker-compose.yml"
        owner: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        mode: 'u=rw,g=r,o=-'

    - name: Deploy Cloudflare API token as Docker secret file
      ansible.builtin.copy:
        content: "{{ ansible_role_traefik_with_acme_cf_token }}"
        dest: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}/cf_dns_api_token.secret"
        owner: "{{ ansible_role_traefik_with_acme_traefik_user }}"
        group: "{{ ansible_role_traefik_with_acme_docker_group }}"
        mode: 'u=r,g=,o='
      no_log: true

- name: Start Traefik via Docker Compose
  tags: traefik_start
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ ansible_role_traefik_with_acme_docker_compose_dir }}"
